<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Tic Tac Toe</h1>
    <select id="mode">
<option value="pvp">Player vs Player</option>
<option value="ai">Player vs Computer</option>
</select>
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
      <div id="celebration">
    <img src="https://img.freepik.com/free-vector/boy-jumping-winner-sign_1308-46141.jpg?semt=ais_rp_50_assets&w=740&q=80" alt="celebration">
</div>
    <p id="status">Player X's turn</p>
    <button onclick="restartGame()">Restart</button>
</div>
<div class="profile-section">

<img src="photo01.jpeg" class="profile-img">

<h1>Dharmveer Bharti</h1>



</div>
<script src="index.js"></script>
</body>
</html>
